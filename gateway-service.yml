spring:
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
          
      # The Swagger Predicates now live here globally
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/auth/**, /auth/v3/api-docs/**
          filters:
            - StripPrefix=0
            - RewritePath=/auth/v3/api-docs(?<segment>.*), /v3/api-docs$\{segment}

        # ... (Same RewritePath pattern applied to policy, claim, and admin) ...

# Swagger UI configuration is globally enforced
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: AUTH SERVICE
        url: /auth/v3/api-docs
      - name: POLICY SERVICE
        url: /policy/v3/api-docs
      - name: CLAIM SERVICE
        url: /claim/v3/api-docs
      - name: ADMIN SERVICE
        url: /admin/v3/api-docs
